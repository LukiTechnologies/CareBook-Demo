<!DOCTYPE html>
<html>
<head>
    <title>CareBook Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        const SUPABASE_URL = "https://mckblvdogrsdylzsiehf.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ja2JsdmRvZ3JzZHlsenNpZWhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjY0MDgsImV4cCI6MjA5MjAwMjQwOH0.3roSyePons2sqy9NRB5lfvr198Hsht6EDg5L4ESFQKE";

        async function validateClinic(code) {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/clinics?activation_code=eq.${code.toUpperCase()}&select=name,is_account_active`, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                const data = await response.json();
                return (data && data.length > 0) ? data[0] : null;
            } catch (error) {
                return null;
            }
        }

        window.onload = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const activationCode = urlParams.get('code');
            const downloadBtn = document.getElementById('download-btn');
            const statusMsg = document.getElementById('status-msg');

            if (!activationCode) {
                downloadBtn.style.display = 'none';
                statusMsg.innerText = "Please scan a valid Clinic QR Code.";
                return;
            }

            const clinic = await validateClinic(activationCode);
                
            if (clinic && clinic.is_account_active) {
                document.getElementById('hospital-name').innerText = clinic.name;
                // Success: Button stays visible, redirect to app
                window.location.href = "carebook://activate?code=" + activationCode;
            } else {
                // Failure: Disable button and show error
                downloadBtn.style.display = 'none';
                downloadBtn.style.pointerEvents = 'none';
                document.getElementById('hospital-name').innerText = "Access Denied";
                statusMsg.style.color = "#ef4444";
                statusMsg.innerText = "Your Clinic is not activated. Please contact Support.";
            }
        }
    </script>
</head>
<body style="font-family: sans-serif; background-color: #f8fafc; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh;">

    <div style="text-align: center; padding: 40px; background: #ffffff; border-radius: 20px; max-width: 450px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        
        <div style="margin-bottom: 30px;">
            <div style="background: #eff6ff; width: 80px; height: 80px; border-radius: 40px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
                <span style="font-size: 40px;">🏥</span>
            </div>
            <h1 id="hospital-name" style="color: #1e3a8a; font-size: 1.6rem; font-weight: 900; margin: 8px 0;">Loading...</h1>
            <p id="status-msg" style="color: #64748b; font-size: 0.9rem;"></p>
        </div>

        <a id="download-btn" href="https://github.com/LukiTechnologies/CareBook-Demo/releases/download/v1.0.0.1/MultiTenancyProdBuild-v1.0.0.1.apk" 
           style="background: #2563eb; color: white; padding: 16px 40px; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; display: inline-block;">
           📥 Download App
        </a>

        <p style="margin-top: 30px; font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;">
            Powered by Luki Technologies
        </p>
    </div>
</body>
</html>
